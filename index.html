<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grenada Studio — Coming Soon</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@1&family=JetBrains+Mono:wght@400;700&family=Space+Grotesk:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #150707;
            --panel: #200c0c;
            --red: #ca2027;
            --glow: #ff3a44;
            --text: #f5e8e8;
        }
        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Space Grotesk', sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            position: relative;
        }
        /* Cinematic Grain & Spotlight */
        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            opacity: 0.06;
            pointer-events: none;
            z-index: 10;
        }
        .spotlight {
            position: absolute;
            width: 100vw;
            height: 100vh;
            background: radial-gradient(circle at 50% 40%, rgba(202, 32, 39, 0.15) 0%, rgba(21, 7, 7, 1) 60%);
            z-index: 0;
            animation: breathe 8s infinite alternate ease-in-out;
        }
        @keyframes breathe {
            0% { opacity: 0.8; transform: scale(1); }
            100% { opacity: 1; transform: scale(1.05); }
        }
        /* Content & Typography */
        .content {
            position: relative;
            z-index: 5;
            text-align: center;
            max-width: 600px;
            padding: 2rem;
        }
        .logo-container {
            margin-bottom: 2rem;
            position: relative;
            display: inline-block;
        }
        .logo {
            max-width: 220px;
            height: auto;
            opacity: 0;
            animation: revealLogo 2s cubic-bezier(0.23, 1, 0.32, 1) forwards;
            filter: drop-shadow(0 0 15px rgba(255, 58, 68, 0.4));
        }
        @keyframes revealLogo {
            0% { clip-path: inset(0 100% 0 0); opacity: 0; }
            50% { opacity: 1; filter: drop-shadow(0 0 25px rgba(255, 58, 68, 0.8)); }
            100% { clip-path: inset(0 0 0 0); opacity: 1; filter: drop-shadow(0 0 15px rgba(255, 58, 68, 0.4)); }
        }
        h1 {
            font-family: 'Instrument Serif', serif;
            font-style: italic;
            font-size: 3.5rem;
            margin-bottom: 1rem;
            font-weight: normal;
            opacity: 0;
            animation: fadeUp 1s ease 1s forwards;
        }
        p.tagline {
            font-size: 1.1rem;
            opacity: 0;
            color: #aaa;
            margin-bottom: 2.5rem;
            animation: fadeUp 1s ease 1.3s forwards;
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        /* Form */
        .form-container {
            opacity: 0;
            animation: fadeUp 1s ease 1.6s forwards;
            display: flex;
            gap: 10px;
            justify-content: center;
            background: var(--panel);
            padding: 8px;
            border-radius: 50px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        input[type="email"] {
            background: transparent;
            border: none;
            color: var(--text);
            font-family: 'JetBrains Mono', monospace;
            padding: 10px 20px;
            outline: none;
            flex: 1;
            width: 250px;
        }
        input[type="email"]::placeholder {
            color: #666;
        }
        button {
            background: var(--red);
            color: var(--text);
            border: none;
            padding: 12px 25px;
            border-radius: 30px;
            font-family: 'JetBrains Mono', monospace;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        button:hover {
            background: var(--glow);
            box-shadow: 0 0 15px rgba(202, 32, 39, 0.5);
        }
        /* Top Bar */
        .top-bar {
            position: absolute;
            top: 30px;
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 40px;
            z-index: 20;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
            color: #888;
        }
        .status-pill { display: flex; align-items: center; gap: 8px; }
        .status-dot {
            width: 8px; height: 8px;
            background: var(--red);
            border-radius: 50%;
            box-shadow: 0 0 8px var(--red);
        }
        .sound-toggle {
            cursor: pointer;
            user-select: none;
            transition: color 0.2s;
        }
        .sound-toggle:hover { color: var(--text); }
        #msg {
            margin-top: 15px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.9rem;
            min-height: 20px;
        }
        .success-msg { color: #f5e8e8; opacity: 0.8; }
    </style>
</head>
<body>
    <div class="top-bar">
        <div class="status-pill">
            <div class="status-dot"></div>
            <span>In production</span>
        </div>
        <div class="sound-toggle" id="soundBtn">Sound: OFF</div>
    </div>

    <div class="spotlight"></div>

    <div class="content">
        <div class="logo-container">
            <img src="logo-red.png" alt="Grenada Studio" class="logo">
        </div>
        <h1>Cinematic Real Estate Marketing</h1>
        <p class="tagline">Elevating properties through striking visuals and intelligent campaigns.</p>
        
        <form id="subscribeForm" class="form-container">
            <input type="email" id="email" placeholder="hello@example.com" required>
            <button type="submit" id="submitBtn">Notify me</button>
        </form>
        <div id="msg"></div>
    </div>

    <script>
        // Web Audio Setup for Interactive Sounds
        let audioCtx = null;
        let soundEnabled = false;

        const soundBtn = document.getElementById('soundBtn');
        soundBtn.addEventListener('click', () => {
            soundEnabled = !soundEnabled;
            soundBtn.textContent = soundEnabled ? 'Sound: ON' : 'Sound: OFF';
            if (soundEnabled && !audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (soundEnabled) {
                playTone(600, 0.1, 0.05);
                setTimeout(() => playTone(800, 0.15, 0.05), 100);
            }
        });

        function playTone(freq, duration, vol) {
            if (!soundEnabled || !audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(vol, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        }

        document.querySelectorAll('button, .sound-toggle').forEach(el => {
            el.addEventListener('mouseenter', () => playTone(400, 0.05, 0.02));
        });

        // Form Submission (Soft Success)
        const form = document.getElementById('subscribeForm');
        const submitBtn = document.getElementById('submitBtn');
        const msg = document.getElementById('msg');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            submitBtn.textContent = 'Sending...';
            submitBtn.disabled = true;
            msg.textContent = '';
            
            // محاكاة إرسال البيانات عشان تشتغل بسلاسة حتى لو الـ API لسه مش مربوط
            setTimeout(() => {
                form.reset();
                submitBtn.textContent = 'On the list ✓';
                msg.textContent = "You're on the list. We'll be in touch.";
                msg.className = 'success-msg';
                playTone(660, 0.08, 0.05);
                setTimeout(() => playTone(990, 0.10, 0.04), 90);
                
                setTimeout(() => {
                    submitBtn.textContent = 'Notify me';
                    submitBtn.disabled = false;
                }, 3000);
            }, 800);
        });
    </script>
</body>
</html>
